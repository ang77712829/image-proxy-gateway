name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: find scripts/ -name "*.py" -exec python -m py_compile {} +

      - name: Import test
        run: |
          cd scripts
          python -c "
          from angemedia_gateway import config, security, routing, schemas
          from angemedia_gateway.routes import admin, media, pages, storage
          from angemedia_gateway.providers import image, custom, base
          print('All imports OK')
          "

      - name: Package gateway
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Packaging AngeMedia Gateway ${VERSION}"

          # Package full repo (gateway + skill + docs) to /tmp first
          cd "${GITHUB_WORKSPACE}"
          tar czf "/tmp/angemedia-gateway-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='AUDIT*.md' \
            --exclude='HANDOFF*.md' \
            --exclude='*.zip' \
            --exclude='*.tar.gz' \
            --exclude='.DS_Store' \
            .
          cp "/tmp/angemedia-gateway-${VERSION}.tar.gz" "${GITHUB_WORKSPACE}/"

          # Package skill only (docs for AI agent use)
          mkdir -p /tmp/skill-pkg
          cp skill/SKILL.md /tmp/skill-pkg/
          cp skill/README.md /tmp/skill-pkg/
          cp -r skill/docs /tmp/skill-pkg/
          cd /tmp/skill-pkg
          tar czf "${GITHUB_WORKSPACE}/angemedia-skill-${VERSION}.tar.gz" .

          echo "Packages created:"
          ls -lh "${GITHUB_WORKSPACE}"/angemedia-*.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            angemedia-gateway-${{ github.ref_name }}.tar.gz
            angemedia-skill-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
