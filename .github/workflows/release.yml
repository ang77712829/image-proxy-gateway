name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          find scripts/ -name "*.py" -exec python -m py_compile {} +

      - name: Import test
        run: |
          cd scripts
          python -c "
          from angemedia_gateway import config, security, routing, schemas
          from angemedia_gateway.routes import admin, media, pages, storage
          from angemedia_gateway.providers import image, custom, base
          print('All imports OK')
          "

      - name: Package gateway
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Packaging AngeMedia Gateway $VERSION"

          # Gateway package (full)
          tar czf "angemedia-gateway-${VERSION}.tar.gz" \
            --exclude='__pycache__' \
            --exclude='.git' \
            --exclude='AUDIT*.md' \
            --exclude='HANDOFF*.md' \
            --exclude='*.zip' \
            --exclude='*.tar.gz' \
            .

          # Skill package (docs only)
          mkdir -p /tmp/skill-pkg
          cp skill/SKILL.md /tmp/skill-pkg/
          cp skill/README.md /tmp/skill-pkg/
          cp -r skill/docs /tmp/skill-pkg/
          cd /tmp/skill-pkg
          tar czf "${GITHUB_WORKSPACE}/angemedia-gateway-skill-${VERSION}.tar.gz" .
          cd "${GITHUB_WORKSPACE}"

          echo "Packages created:"
          ls -lh angemedia-gateway-*.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            angemedia-gateway-${{ github.ref_name }}.tar.gz
            angemedia-gateway-skill-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
