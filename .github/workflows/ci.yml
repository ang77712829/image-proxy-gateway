name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Repository hygiene
        run: |
          forbidden="$(find . -maxdepth 1 \( -name 'AUDIT*.md' -o -name 'HANDOFF*.md' -o -name '*Release-Report*.md' -o -name 'DEVELOPMENT.md' \) -print)"
          if [ -n "$forbidden" ]; then
            echo "Forbidden development documents found:"
            echo "$forbidden"
            exit 1
          fi

      - name: Python syntax check
        run: |
          python -m compileall scripts tests
          echo "All syntax checks passed"

      - name: JavaScript syntax check
        run: |
          for f in app/www/assets/*.js; do
            node --check "$f"
          done

      - name: Unit and smoke tests
        run: |
          python -m unittest discover -s tests -v
